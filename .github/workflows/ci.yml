name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          python-version: "3.11"
      - name: Install dependencies
        run: uv sync --locked
      - name: Check formatting
        run: uv run --locked ruff format --check .
      - name: Lint
        run: uv run --locked ruff check .
      - name: Type check
        run: uv run --locked ty check
      - name: Build documentation
        run: uv run --locked sphinx-build -W -b html docs docs/_build/html

  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-suffix: py${{ matrix.python-version }}
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --locked
      - name: Run tests with coverage
        run: uv run --locked coverage run -m pytest
      - name: Enforce coverage
        run: uv run --locked coverage report

  package:
    name: Package
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          python-version: "3.11"
      - name: Build distributions
        run: uv build
      - name: Install wheel in an isolated environment
        run: |
          uv venv --clear .venv-wheel
          uv pip install --python .venv-wheel/bin/python dist/*.whl
          .venv-wheel/bin/python -c "import pact"
